<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <defs>
    <radialGradient id="bgRing" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--ring-inner, rgba(212,168,83,0.08))"/>
      <stop offset="55%" stop-color="var(--ring-mid, rgba(45,212,191,0.05))"/>
      <stop offset="100%" stop-color="var(--ring-outer, transparent)"/>
    </radialGradient>
    <linearGradient id="swoosh1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a853"/>
      <stop offset="100%" stop-color="#c49a45"/>
    </linearGradient>
    <linearGradient id="swoosh2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a04a"/>
      <stop offset="100%" stop-color="#3dbda8"/>
    </linearGradient>
    <linearGradient id="swoosh3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#24b8a5"/>
    </linearGradient>
    <linearGradient id="swoosh4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#1fa892"/>
    </linearGradient>
    <linearGradient id="swoosh5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3dbda8"/>
      <stop offset="100%" stop-color="#c9a04a"/>
    </linearGradient>
    <linearGradient id="swoosh6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a853"/>
      <stop offset="100%" stop-color="#e8bc6a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="var(--shadow, rgba(0,0,0,0.25))"/>
    </filter>
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="var(--shadow, rgba(0,0,0,0.2))"/>
    </filter>
  </defs>

  <!-- Background rings -->
  <circle cx="400" cy="400" r="360" fill="url(#bgRing)"/>
  <circle cx="400" cy="400" r="300" fill="none" stroke="var(--ring-stroke, rgba(212,168,83,0.12))" stroke-width="1.5"/>
  <circle cx="400" cy="400" r="240" fill="none" stroke="var(--ring-stroke2, rgba(45,212,191,0.1))" stroke-width="1"/>

  <!-- Swoosh connectors -->
  <path d="M400 280 C 380 220, 340 180, 300 160" stroke="url(#swoosh6)" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M480 310 C 540 270, 590 230, 620 190" stroke="url(#swoosh1)" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M510 400 C 570 410, 620 440, 650 490" stroke="url(#swoosh2)" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M460 480 C 480 540, 480 590, 460 640" stroke="url(#swoosh3)" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M340 480 C 320 540, 280 590, 240 620" stroke="url(#swoosh4)" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M290 400 C 230 390, 180 360, 150 310" stroke="url(#swoosh5)" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.85"/>

  <!-- Central hub -->
  <circle cx="400" cy="400" r="95" fill="var(--hub-bg, rgba(212,168,83,0.15))" stroke="var(--hub-border, rgba(212,168,83,0.35))" stroke-width="2" filter="url(#softShadow)"/>
  <text x="400" y="392" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="42" font-weight="700" fill="var(--hub-text, #d4a853)">ERP</text>
  <text x="400" y="422" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="11" fill="var(--hub-sub, #9d9bb8)">Enterprise resource planning</text>

  <!-- Node: Management (top-left) -->
  <g filter="url(#nodeShadow)">
    <circle cx="155" cy="285" r="52" fill="#c9a04a"/>
    <g transform="translate(155,285)" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="-8" r="6"/>
      <circle cx="-14" cy="12" r="5"/>
      <circle cx="14" cy="12" r="5"/>
      <line x1="0" y1="-2" x2="-10" y2="8"/>
      <line x1="0" y1="-2" x2="10" y2="8"/>
    </g>
  </g>
  <circle cx="95" cy="235" r="5" fill="#fff"/>
  <rect x="28" y="218" width="118" height="34" rx="17" fill="var(--label-bg, #fff)" stroke="#c9a04a" stroke-width="1.5"/>
  <text x="87" y="240" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="13" font-weight="600" fill="var(--label-gold, #a07830)">Management</text>

  <!-- Node: Production (top) -->
  <g filter="url(#nodeShadow)">
    <circle cx="300" cy="145" r="52" fill="#d4a853"/>
    <g transform="translate(300,145)" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="0" r="16"/>
      <path d="M0 -16 L4 -6 L16 -4 L8 4 L10 16 L0 10 L-10 16 L-8 4 L-16 -4 L-4 -6 Z"/>
      <line x1="12" y1="12" x2="20" y2="20"/>
      <line x1="20" y1="12" x2="12" y2="20"/>
    </g>
  </g>
  <circle cx="355" cy="105" r="5" fill="#fff"/>
  <rect x="318" y="82" width="108" height="34" rx="17" fill="var(--label-bg, #fff)" stroke="#d4a853" stroke-width="1.5"/>
  <text x="372" y="104" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="13" font-weight="600" fill="var(--label-gold, #a07830)">Production</text>

  <!-- Node: Finance (top-right) -->
  <g filter="url(#nodeShadow)">
    <circle cx="620" cy="190" r="52" fill="#b8923f"/>
    <g transform="translate(620,190)" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-14" y="-16" width="20" height="26" rx="2"/>
      <rect x="-6" y="-10" width="20" height="26" rx="2"/>
      <line x1="-10" y1="-4" x2="2" y2="-4"/>
      <line x1="-10" y1="2" x2="2" y2="2"/>
      <circle cx="14" cy="8" r="8"/>
      <text x="14" y="12" text-anchor="middle" font-size="10" fill="#fff" stroke="none" font-weight="700">$</text>
    </g>
  </g>
  <circle cx="665" cy="155" r="5" fill="#fff"/>
  <rect x="628" y="132" width="88" height="34" rx="17" fill="var(--label-bg, #fff)" stroke="#b8923f" stroke-width="1.5"/>
  <text x="672" y="154" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="13" font-weight="600" fill="var(--label-gold, #8a6020)">Finance</text>

  <!-- Node: Logistic (bottom-right) -->
  <g filter="url(#nodeShadow)">
    <circle cx="655" cy="495" r="52" fill="#2db8a4"/>
    <g transform="translate(655,495)" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-22" y="-8" width="30" height="18" rx="3"/>
      <path d="M8 -8 L18 -8 L24 2 L24 10 L-22 10"/>
      <circle cx="-14" cy="12" r="5"/>
      <circle cx="16" cy="12" r="5"/>
      <polyline points="28,-2 34,-2 34,4"/>
      <line x1="34" y1="-2" x2="40" y2="-2"/>
    </g>
  </g>
  <circle cx="700" cy="545" r="5" fill="#fff"/>
  <rect x="658" y="558" width="88" height="34" rx="17" fill="var(--label-bg, #fff)" stroke="#2db8a4" stroke-width="1.5"/>
  <text x="702" y="580" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="13" font-weight="600" fill="var(--label-teal, #0d7a6e)">Logistic</text>

  <!-- Node: Sales (bottom) -->
  <g filter="url(#nodeShadow)">
    <circle cx="460" cy="645" r="52" fill="#24b8a5"/>
    <g transform="translate(460,645)" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="-18" y1="10" x2="-18" y2="-14"/>
      <line x1="-6" y1="10" x2="-6" y2="-6"/>
      <line x1="6" y1="10" x2="6" y2="-10"/>
      <line x1="18" y1="10" x2="18" y2="-16"/>
      <polyline points="-18,-14 -6,-6 6,-10 18,-16"/>
    </g>
  </g>
  <circle cx="420" cy="690" r="5" fill="#fff"/>
  <rect x="378" y="703" width="76" height="34" rx="17" fill="var(--label-bg, #fff)" stroke="#24b8a5" stroke-width="1.5"/>
  <text x="416" y="725" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="13" font-weight="600" fill="var(--label-teal, #0d7a6e)">Sales</text>

  <!-- Node: Human Resources (bottom-left) -->
  <g filter="url(#nodeShadow)">
    <circle cx="240" cy="625" r="52" fill="#3dbda8"/>
    <g transform="translate(240,625)" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="-10" r="6"/>
      <path d="M-16 14 C-16 4 -8 0 0 0 C8 0 16 4 16 14"/>
      <circle cx="-18" cy="-2" r="5"/>
      <path d="M-28 12 C-28 4 -24 0 -18 0"/>
      <circle cx="18" cy="-2" r="5"/>
      <path d="M28 12 C28 4 24 0 18 0"/>
    </g>
  </g>
  <circle cx="175" cy="670" r="5" fill="#fff"/>
  <rect x="68" y="683" width="148" height="34" rx="17" fill="var(--label-bg, #fff)" stroke="#3dbda8" stroke-width="1.5"/>
  <text x="142" y="705" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="13" font-weight="600" fill="var(--label-teal, #0d7a6e)">Human Resources</text>
</svg>
